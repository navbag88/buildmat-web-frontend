name: CI/CD Pipeline - Deploy Frontend to DigitalOcean

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -- --outDir dist

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy setup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_FRONTEND_HOST }}
          username: ${{ secrets.DIGITALOCEAN_FRONTEND_USER }}
          key: ${{ secrets.DIGITALOCEAN_FRONTEND_SSH_KEY }}
          port: 22
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Docker not found, installing..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi
            mkdir -p /var/www/buildmat-web-frontend

      - name: Deploy application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_FRONTEND_HOST }}
          username: ${{ secrets.DIGITALOCEAN_FRONTEND_USER }}
          key: ${{ secrets.DIGITALOCEAN_FRONTEND_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/buildmat-web-frontend
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop buildmat-frontend 2>/dev/null || true
            docker rm buildmat-frontend 2>/dev/null || true
            docker run -d \
              --name buildmat-frontend \
              --restart unless-stopped \
              -p 3000:80 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            echo "Frontend deployment successful!"
